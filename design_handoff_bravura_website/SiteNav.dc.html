<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/bravura-detailing-design-system-85ff83b0-1b3d-410d-b02f-101523cc0df7/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/bravura-detailing-design-system-85ff83b0-1b3d-410d-b02f-101523cc0df7/tokens/colors.css">
  <link rel="stylesheet" href="_ds/bravura-detailing-design-system-85ff83b0-1b3d-410d-b02f-101523cc0df7/tokens/typography.css">
  <link rel="stylesheet" href="_ds/bravura-detailing-design-system-85ff83b0-1b3d-410d-b02f-101523cc0df7/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/bravura-detailing-design-system-85ff83b0-1b3d-410d-b02f-101523cc0df7/styles.css">
  <script src="_ds/bravura-detailing-design-system-85ff83b0-1b3d-410d-b02f-101523cc0df7/_ds_bundle.js"></script>
  <style>
    .bd-burger{display:none!important}
    @media (max-width:940px){
      .bd-nav-links{display:none!important}
      .bd-nav-phone{display:none!important}
      .bd-burger{display:flex!important}
    }
    @media (max-width:520px){ .bd-nav-cta{display:none!important} }
  </style>
</helmet>
<nav aria-label="Primary" style="{{ navStyle }}">
  <div style="max-width:1440px;margin:0 auto;padding:0 40px;height:72px;display:flex;align-items:center;justify-content:space-between;gap:24px">
    <a href="Home.dc.html" aria-label="Bravura Detailing home" style="display:flex;align-items:center;gap:14px;text-decoration:none;flex-shrink:0">
      <img src="assets/bravura-logo.png" alt="Bravura Detailing" style="height:44px;width:auto;display:block" />
    </a>
    <ul class="bd-nav-links" style="display:flex;align-items:center;gap:38px;margin:0;padding:0;list-style:none">
      <sc-for list="{{ navLinks }}" as="link" hint-placeholder-count="5">
        <li style="display:block">
          <a href="{{ link.href }}" aria-current="{{ link.current }}" style="{{ link.style }}" onMouseEnter="{{ link.onEnter }}" onMouseLeave="{{ link.onLeave }}">{{ link.label }}</a>
        </li>
      </sc-for>
    </ul>
    <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
      <a href="tel:4808154711" style="font-family:var(--font-body);font-size:14px;color:var(--chrome-2);text-decoration:none;letter-spacing:.2px;white-space:nowrap" class="bd-nav-phone">480-815-4711</a>
      <a href="Contact.dc.html" class="bd-nav-cta" style="{{ ctaStyle }}" onMouseEnter="{{ onCtaEnter }}" onMouseLeave="{{ onCtaLeave }}">Request a Quote</a>
      <button class="bd-burger" aria-label="Open menu" aria-expanded="{{ menuOpen }}" onClick="{{ toggleMenu }}" style="{{ burgerStyle }}">
        <span style="{{ burgerBar }}"></span><span style="{{ burgerBar }}"></span><span style="{{ burgerBar }}"></span>
      </button>
    </div>
  </div>
  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <ul style="list-style:none;margin:0;padding:8px 40px 24px;display:flex;flex-direction:column;gap:4px;background-color:var(--abyss);border-top-width:1px;border-top-style:solid;border-top-color:var(--border-hairline)">
      <sc-for list="{{ navLinks }}" as="link" hint-placeholder-count="5">
        <li><a href="{{ link.href }}" style="display:block;padding:14px 0;font-family:var(--font-display);text-transform:uppercase;font-size:18px;letter-spacing:1px;color:var(--white);text-decoration:none;border-bottom:1px solid var(--border-hairline)">{{ link.label }}</a></li>
      </sc-for>
      <li><a href="Contact.dc.html" style="display:block;margin-top:12px;padding:16px;text-align:center;background-color:var(--gold);color:var(--abyss);font-family:var(--font-display);text-transform:uppercase;font-size:15px;letter-spacing:.5px;text-decoration:none">Request a Quote</a></li>
    </ul>
  </sc-if>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:140},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Home&quot;,&quot;About&quot;,&quot;Services&quot;,&quot;Portfolio&quot;,&quot;Contact&quot;],&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { scrolled: false, menuOpen: false, hover: null, ctaHover: false };

  componentDidMount() {
    this._onScroll = () => {
      const s = window.scrollY > 24;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    this._onScroll();
  }
  componentWillUnmount() { window.removeEventListener('scroll', this._onScroll); }

  renderVals() {
    const active = this.props.active || 'Home';
    const scrolled = this.state.scrolled || this.state.menuOpen;
    const pages = [
      { label: 'Home', href: 'Home.dc.html' },
      { label: 'About', href: 'About.dc.html' },
      { label: 'Services', href: 'Services.dc.html' },
      { label: 'Contact', href: 'Contact.dc.html' },
    ];
    const navLinks = pages.map((p, i) => {
      const isActive = p.label === active;
      const isHover = this.state.hover === i;
      return {
        label: p.label,
        href: p.href,
        current: isActive ? 'page' : undefined,
        onEnter: () => this.setState({ hover: i }),
        onLeave: () => this.setState({ hover: null }),
        style: `font-family:var(--font-display);text-transform:uppercase;font-size:14px;letter-spacing:1.2px;font-weight:400;text-decoration:none;padding:6px 0;transition:color var(--dur) var(--ease);color:${isActive ? 'var(--gold)' : (isHover ? 'var(--white)' : 'var(--chrome-3)')};border-bottom:2px solid ${isActive ? 'var(--gold)' : 'transparent'}`,
      };
    });
    return {
      navLinks,
      menuOpen: this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      navStyle: `position:fixed;top:0;left:0;right:0;z-index:100;transition:background-color var(--dur) var(--ease),border-color var(--dur) var(--ease);background-color:${scrolled ? 'rgba(0,0,0,0.94)' : 'transparent'};border-bottom-width:1px;border-bottom-style:solid;border-bottom-color:${scrolled ? 'var(--border-hairline)' : 'transparent'}`,
      ctaStyle: `display:inline-flex;align-items:center;padding:12px 22px;background-color:${this.state.ctaHover ? 'var(--gold-dark)' : 'var(--gold)'};color:var(--abyss);font-family:var(--font-display);text-transform:uppercase;font-size:13.5px;letter-spacing:.5px;font-weight:500;text-decoration:none;transition:background var(--dur) var(--ease);white-space:nowrap`,
      onCtaEnter: () => this.setState({ ctaHover: true }),
      onCtaLeave: () => this.setState({ ctaHover: false }),
      burgerStyle: 'display:none;flex-direction:column;gap:5px;background-color:transparent;border:none;cursor:pointer;padding:8px',
      burgerBar: 'display:block;width:22px;height:2px;background-color:var(--white)',
    };
  }
}
</script>
</body>
</html>
